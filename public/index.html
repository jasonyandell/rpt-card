<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>RPT Card</title>
  <style>
    :root {
      --bg: #1a1a2e;
      --surface: #16213e;
      --surface2: #0f3460;
      --accent: #ff5a7e;
      --accent2: #7c4dff;
      --today: #1a4a2e;
      --today-border: #4ade80;
      --text: #ffffff;
      --text-dim: #a0a0a0;
      --cell-bg: #1e2a3a;
      --cell-border: #2a3a4a;
      --header-bg: #0d1b2a;
      --input-bg: #0d1b2a;
      --avg-bg: #12202e;
      --row-hover: #1e2e40;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ── Header ── */
    #app-header {
      background: var(--header-bg);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid var(--accent);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    #app-header h1 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
    }

    #header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #week-nav {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .nav-btn {
      background: var(--surface2);
      border: 1px solid var(--cell-border);
      color: var(--text);
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
      touch-action: manipulation;
    }
    .nav-btn:active { background: var(--accent2); }

    #range-label {
      font-size: 11px;
      color: var(--text-dim);
      white-space: nowrap;
    }

    #today-btn {
      background: var(--today);
      border: 1px solid var(--today-border);
      color: var(--today-border);
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
      touch-action: manipulation;
    }

    /* ── Save indicator ── */
    #save-indicator {
      font-size: 11px;
      color: var(--text-dim);
      min-width: 50px;
      text-align: right;
      transition: color 0.3s;
    }
    #save-indicator.saving { color: #f39c12; }
    #save-indicator.saved  { color: var(--today-border); }
    #save-indicator.error  { color: var(--accent); }

    /* ── Grid wrapper ── */
    #grid-wrapper {
      overflow-x: auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 80px;
    }

    /* ── Table ── */
    table {
      border-collapse: separate;
      border-spacing: 4px;
      min-width: 100%;
    }

    th, td {
      text-align: center;
      white-space: nowrap;
    }

    /* Activity label column */
    td.activity-label {
      text-align: left;
      padding: 8px 10px;
      background: var(--header-bg);
      font-weight: 600;
      font-size: 16px;
      position: sticky;
      left: 0;
      z-index: 10;
      min-width: 94px;
      max-width: 94px;
    }

    th.activity-header {
      background: var(--header-bg);
      position: sticky;
      left: 0;
      z-index: 20;
      min-width: 94px;
      padding: 6px 10px;
      font-size: 16px;
    }

    /* Date header */
    th.date-header {
      background: var(--header-bg);
      padding: 5px 4px;
      font-size: 12px;
      font-weight: 600;
      min-width: 56px;
      color: var(--text-dim);
    }

    th.date-header .day-name {
      display: block;
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 400;
    }

    th.date-header.today-col {
      background: var(--today);
      color: var(--today-border);
      border-bottom: 2px solid var(--today-border);
    }

    /* Data cells */
    td.data-cell {
      padding: 0;
      min-width: 56px;
      max-width: 56px;
      height: 48px;
      background: var(--cell-bg);
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      border-radius: 4px;
      transition: background 0.1s;
    }

    td.data-cell:active {
      background: var(--surface2);
    }

    td.data-cell.today-col {
      background: var(--today);
    }
    td.data-cell.today-col:active {
      background: #1e5a2e;
    }

    tr:hover td.activity-label,
    tr:hover td.data-cell {
      background: var(--row-hover);
    }
    tr:hover td.data-cell.today-col {
      background: #1e4a2e;
    }

    /* Cell value display */
    .cell-value {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 48px;
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      touch-action: manipulation;
    }
    .cell-value.negative { color: #ff6b6b; }
    .cell-value.positive { color: #4ade80; }

    /* Average row */
    tr.avg-row td {
      background: var(--avg-bg);
      font-weight: 700;
      font-size: 14px;
    }
    tr.avg-row td.activity-label {
      color: var(--accent);
      font-size: 14px;
      letter-spacing: 1px;
    }
    tr.avg-row td.avg-cell {
      padding: 8px 4px;
      color: #fbbf24;
      height: 48px;
    }
    tr.avg-row td.avg-cell.negative-avg { color: #ff6b6b; }
    tr.avg-row td.avg-cell.today-col { background: #1a3020; }

    /* ── Stepper Modal ── */
    #modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 500;
      touch-action: none;
    }
    #modal-overlay.open { display: block; }

    #stepper-modal {
      position: fixed;
      left: 0; right: 0; bottom: 0;
      background: var(--header-bg);
      border-top: 3px solid var(--accent);
      border-radius: 16px 16px 0 0;
      padding: 20px 16px 32px;
      z-index: 501;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-height: 80vh;
      overflow-y: auto;
      transform: translateY(100%);
      transition: transform 0.25s ease-out;
    }
    #stepper-modal.open {
      display: flex;
      transform: translateY(0);
    }

    .modal-handle {
      width: 40px;
      height: 5px;
      background: #555;
      border-radius: 3px;
      margin-bottom: 4px;
    }

    .modal-title {
      font-size: 22px;
      font-weight: 700;
      color: var(--accent);
      text-align: center;
    }
    .modal-date {
      font-size: 16px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    .modal-current-value {
      font-size: 56px;
      font-weight: 700;
      color: var(--text);
      min-height: 68px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-current-value.empty {
      color: var(--text-dim);
      font-size: 24px;
    }

    .stepper-row {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .stepper-btn {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 3px solid var(--accent2);
      background: var(--surface2);
      color: var(--text);
      font-size: 36px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      transition: background 0.1s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
    }
    .stepper-btn:active {
      background: var(--accent2);
      transform: scale(0.95);
    }

    .presets-label {
      font-size: 13px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .presets-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .preset-btn {
      min-width: 64px;
      height: 52px;
      border-radius: 10px;
      border: 2px solid var(--accent2);
      background: var(--surface);
      color: var(--text);
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      padding: 0 16px;
      transition: background 0.1s, transform 0.1s;
      -webkit-user-select: none;
      user-select: none;
    }
    .preset-btn:active {
      background: var(--accent2);
      transform: scale(0.95);
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      width: 100%;
      max-width: 360px;
    }

    .modal-action-btn {
      flex: 1;
      height: 52px;
      border-radius: 10px;
      border: none;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-user-select: none;
      user-select: none;
      transition: opacity 0.1s;
    }
    .modal-action-btn:active { opacity: 0.7; }

    .btn-clear {
      background: #3a2020;
      color: #ff6b6b;
      border: 2px solid #ff6b6b;
    }
    .btn-done {
      background: var(--today);
      color: var(--today-border);
      border: 2px solid var(--today-border);
    }

    /* ── Loading / error state ── */
    #status-bar {
      text-align: center;
      padding: 20px;
      color: var(--text-dim);
      font-size: 13px;
    }

    /* ── Scrollbar styling ── */
    #grid-wrapper::-webkit-scrollbar { height: 6px; width: 6px; }
    #grid-wrapper::-webkit-scrollbar-track { background: var(--bg); }
    #grid-wrapper::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }

    /* ── Mobile tweaks ── */
    @media (max-width: 400px) {
      #app-header h1 { font-size: 15px; }
      td.activity-label, th.activity-header { min-width: 78px; max-width: 78px; font-size: 14px; }
      th.date-header, td.data-cell { min-width: 48px; max-width: 48px; }
      .cell-value { font-size: 14px; height: 48px; }
    }
  </style>
</head>
<body>

<div id="app-header">
  <h1>RPT CARD</h1>
  <div id="header-right">
    <div id="week-nav">
      <button class="nav-btn" id="btn-prev">&#8249;</button>
      <span id="range-label"></span>
      <button class="nav-btn" id="btn-next">&#8250;</button>
    </div>
    <button id="today-btn">Today</button>
    <span id="save-indicator"></span>
  </div>
</div>

<div id="grid-wrapper">
  <div id="status-bar">Loading…</div>
  <table id="grid" style="display:none">
    <thead id="grid-head"></thead>
    <tbody id="grid-body"></tbody>
    <tfoot id="grid-foot"></tfoot>
  </table>
</div>

<!-- Stepper Modal -->
<div id="modal-overlay"></div>
<div id="stepper-modal">
  <div class="modal-handle"></div>
  <div class="modal-title" id="modal-activity"></div>
  <div class="modal-date" id="modal-date"></div>
  <div class="modal-current-value" id="modal-value"></div>
  <div class="stepper-row">
    <button class="stepper-btn" id="btn-minus">&minus;</button>
    <button class="stepper-btn" id="btn-plus">+</button>
  </div>
  <div class="presets-label">Quick entry</div>
  <div class="presets-row" id="modal-presets"></div>
  <div class="modal-actions">
    <button class="modal-action-btn btn-clear" id="btn-clear">Clear</button>
    <button class="modal-action-btn btn-done" id="btn-done">Done</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  Constants
// ─────────────────────────────────────────────
const ACTIVITIES = [
  "Walking", "Triking", "Voice", "Torso", "RYTARY",
  "Weight", "DBS", "Water", "Erin", "Dishes",
  "Trash", "Mail", "Laundry", "Chores"
];

const ACTIVITY_PRESETS = {
  Walking: [30, 40, 50, 60],
  Triking: [30, 40, 50, 60],
  Voice: [10, 15, 20, 30],
  Torso: [10, 15, 20, 30],
  RYTARY: [4, 5, 6, 9],
  Weight: [-5, -3, -2, -1],
  DBS: [3, 4, 5, 6],
  Water: [2, 3, 4, 6],
  Erin: [1, 3, 6, 9],
  Dishes: [1, 2, 3, 4],
  Trash: [1, 2, 3, 4],
  Mail: [1, 2, 3, 4],
  Laundry: [1, 2, 3, 4],
  Chores: [1, 2, 3, 4],
};

const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const VIEW_DAYS = 14; // show 2 weeks at a time
const DEBOUNCE_MS = 300;

// ─────────────────────────────────────────────
//  State
// ─────────────────────────────────────────────
let anchorDate = todayStr();   // YYYY-MM-DD of the "end" date of current view
let data = {};                  // { "YYYY-MM-DD": { activity: value } }
let saveTimer = null;

// Modal state
let modalActivity = null;
let modalDate = null;
let modalValue = null;

// Touch debounce
let lastTapTime = 0;

function debounced(fn) {
  return function(e) {
    const now = Date.now();
    if (now - lastTapTime < DEBOUNCE_MS) return;
    lastTapTime = now;
    fn.call(this, e);
  };
}

// ─────────────────────────────────────────────
//  Date helpers
// ─────────────────────────────────────────────
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}

function addDays(dateStr, n) {
  const d = new Date(dateStr + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

function formatShort(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return (d.getMonth() + 1) + "/" + d.getDate();
}

function formatFull(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return DAYS[d.getDay()] + ", " + months[d.getMonth()] + " " + d.getDate();
}

function dayName(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  return DAYS[d.getDay()];
}

function dateRange() {
  const to = anchorDate;
  const from = addDays(to, -(VIEW_DAYS - 1));
  return { from, to };
}

// ─────────────────────────────────────────────
//  API
// ─────────────────────────────────────────────
async function fetchEntries(from, to) {
  const res = await fetch(`/api/entries?from=${from}&to=${to}`);
  if (!res.ok) throw new Error("fetch failed: " + res.status);
  return res.json();
}

async function putEntry(activity, date, value) {
  const res = await fetch("/api/entries", {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ activity, date, value }),
  });
  if (!res.ok) throw new Error("save failed: " + res.status);
  return res.json();
}

// ─────────────────────────────────────────────
//  Save indicator
// ─────────────────────────────────────────────
function setSaveStatus(state, msg) {
  const el = document.getElementById("save-indicator");
  el.className = state;
  el.textContent = msg;
}

// ─────────────────────────────────────────────
//  Build grid
// ─────────────────────────────────────────────
function buildGrid(dates) {
  const today = todayStr();
  const head = document.getElementById("grid-head");
  const body = document.getElementById("grid-body");

  // ── Header row ──
  let headHTML = "<tr><th class='activity-header'>Activity</th>";
  for (const d of dates) {
    const isToday = d === today;
    headHTML += `<th class="date-header${isToday ? " today-col" : ""}" data-date="${d}">
      <span class="day-name">${dayName(d)}</span>${formatShort(d)}
    </th>`;
  }
  headHTML += "</tr>";
  head.innerHTML = headHTML;

  // ── Data rows ──
  let bodyHTML = "";
  for (const act of ACTIVITIES) {
    bodyHTML += `<tr data-activity="${act}">`;
    bodyHTML += `<td class="activity-label">${act}</td>`;
    for (const d of dates) {
      const isToday = d === today;
      const val = (data[d] && data[d][act] !== undefined) ? data[d][act] : "";
      const cls = val === "" ? "" : (parseFloat(val) < 0 ? " negative" : " positive");
      bodyHTML += `<td class="data-cell${isToday ? " today-col" : ""}" data-activity="${act}" data-date="${d}">
        <div class="cell-value${cls}" data-activity="${act}" data-date="${d}">${val !== "" ? val : ""}</div>
      </td>`;
    }
    bodyHTML += "</tr>";
  }
  body.innerHTML = bodyHTML;

  // ── Totals row ──
  buildTotalsRow(dates);

  // ── Tap listeners on cells ──
  body.querySelectorAll("td.data-cell").forEach(cell => {
    cell.addEventListener("click", debounced(onCellTap));
  });
}

function buildTotalsRow(dates) {
  const today = todayStr();
  const foot = document.getElementById("grid-foot");

  const totals = dates.map(d => computeColTotal(d));
  const nonNull = totals.filter(t => t !== null);
  const avg = nonNull.length ? nonNull.reduce((a, b) => a + b, 0) / nonNull.length : null;
  const avgDisplay = avg === null ? "AVG" : `AVG ${avg.toFixed(1)}`;

  let html = `<tr class='avg-row'><td class='activity-label'>${avgDisplay}</td>`;
  for (let i = 0; i < dates.length; i++) {
    const d = dates[i];
    const isToday = d === today;
    const total = totals[i];
    const display = total === null ? "" : (Number.isInteger(total) ? total : total.toFixed(1));
    const negCls = (total !== null && total < 0) ? " negative-avg" : "";
    html += `<td class="avg-cell${isToday ? " today-col" : ""}${negCls}" data-date="${d}">${display}</td>`;
  }
  html += "</tr>";
  foot.innerHTML = html;
}

function computeColTotal(dateStr) {
  const dayData = data[dateStr];
  if (!dayData) return null;
  const vals = Object.values(dayData).filter(v => v !== null && v !== undefined && v !== "");
  if (!vals.length) return null;
  return vals.reduce((a, b) => a + parseFloat(b), 0);
}

function refreshTotalsRow() {
  buildTotalsRow(getDates());
}

// Update a single cell's display without rebuilding the whole grid
function updateCellDisplay(activity, date, value) {
  const cell = document.querySelector(`td.data-cell[data-activity="${activity}"][data-date="${date}"] .cell-value`);
  if (!cell) return;
  cell.textContent = (value !== null && value !== undefined && value !== "") ? value : "";
  cell.className = "cell-value";
  if (value !== null && value !== undefined && value !== "") {
    cell.classList.add(parseFloat(value) < 0 ? "negative" : "positive");
  }
}

// ─────────────────────────────────────────────
//  Cell tap → open modal
// ─────────────────────────────────────────────
function onCellTap(e) {
  const cell = e.currentTarget;
  const activity = cell.dataset.activity;
  const date = cell.dataset.date;
  openModal(activity, date);
}

// ─────────────────────────────────────────────
//  Stepper Modal
// ─────────────────────────────────────────────
function openModal(activity, date) {
  modalActivity = activity;
  modalDate = date;
  modalValue = (data[date] && data[date][activity] !== undefined) ? data[date][activity] : null;

  document.getElementById("modal-activity").textContent = activity;
  document.getElementById("modal-date").textContent = formatFull(date);
  updateModalValue();

  // Build presets
  const presets = ACTIVITY_PRESETS[activity] || [1, 2, 3, 5];
  const presetsContainer = document.getElementById("modal-presets");
  presetsContainer.innerHTML = "";
  for (const p of presets) {
    const btn = document.createElement("button");
    btn.className = "preset-btn";
    btn.textContent = p;
    btn.addEventListener("click", debounced(() => {
      modalValue = p;
      updateModalValue();
    }));
    presetsContainer.appendChild(btn);
  }

  document.getElementById("modal-overlay").classList.add("open");
  // Force reflow before adding open class for transition
  const modal = document.getElementById("stepper-modal");
  modal.style.display = "flex";
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      modal.classList.add("open");
    });
  });
}

function updateModalValue() {
  const el = document.getElementById("modal-value");
  if (modalValue === null || modalValue === undefined) {
    el.textContent = "—";
    el.className = "modal-current-value empty";
  } else {
    el.textContent = modalValue;
    el.className = "modal-current-value";
  }
}

function closeModal() {
  // Save the value
  const activity = modalActivity;
  const date = modalDate;
  const value = modalValue;

  if (!data[date]) data[date] = {};
  const old = data[date][activity];

  if (value === null) {
    delete data[date][activity];
  } else {
    data[date][activity] = value;
  }

  updateCellDisplay(activity, date, value);
  refreshTotalsRow();

  if (old !== value && !(old === undefined && value === null)) {
    scheduleSave(activity, date, value);
  }

  // Close
  document.getElementById("modal-overlay").classList.remove("open");
  const modal = document.getElementById("stepper-modal");
  modal.classList.remove("open");
  setTimeout(() => { modal.style.display = "none"; }, 250);

  modalActivity = null;
  modalDate = null;
  modalValue = null;
}

// Modal button listeners
document.getElementById("btn-minus").addEventListener("click", debounced(() => {
  if (modalValue === null) modalValue = 0;
  modalValue = Math.round((modalValue - 1) * 100) / 100;
  updateModalValue();
}));

document.getElementById("btn-plus").addEventListener("click", debounced(() => {
  if (modalValue === null) modalValue = 0;
  modalValue = Math.round((modalValue + 1) * 100) / 100;
  updateModalValue();
}));

document.getElementById("btn-clear").addEventListener("click", debounced(() => {
  modalValue = null;
  updateModalValue();
}));

document.getElementById("btn-done").addEventListener("click", debounced(() => {
  closeModal();
}));

// Tap overlay to dismiss
document.getElementById("modal-overlay").addEventListener("click", debounced(() => {
  closeModal();
}));

// Swipe down to dismiss
let touchStartY = 0;
document.getElementById("stepper-modal").addEventListener("touchstart", (e) => {
  touchStartY = e.touches[0].clientY;
}, { passive: true });
document.getElementById("stepper-modal").addEventListener("touchend", (e) => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 80) closeModal();
}, { passive: true });

// ─────────────────────────────────────────────
//  Debounced save
// ─────────────────────────────────────────────
const pendingSaves = new Map(); // "activity|date" → value

function scheduleSave(activity, date, value) {
  const key = `${activity}|${date}`;
  pendingSaves.set(key, { activity, date, value });

  clearTimeout(saveTimer);
  setSaveStatus("saving", "saving…");

  saveTimer = setTimeout(flushSaves, 600);
}

async function flushSaves() {
  const items = [...pendingSaves.entries()];
  pendingSaves.clear();

  try {
    await Promise.all(items.map(([, item]) =>
      putEntry(item.activity, item.date, item.value)
    ));
    setSaveStatus("saved", "saved ✓");
    setTimeout(() => setSaveStatus("", ""), 2000);
  } catch (err) {
    setSaveStatus("error", "error ✗");
    console.error("Save failed", err);
  }
}

// ─────────────────────────────────────────────
//  Load & render
// ─────────────────────────────────────────────
function getDates() {
  const { from, to } = dateRange();
  const dates = [];
  let cur = from;
  while (cur <= to) {
    dates.push(cur);
    cur = addDays(cur, 1);
  }
  return dates;
}

async function load() {
  const statusBar = document.getElementById("status-bar");
  const grid = document.getElementById("grid");
  statusBar.style.display = "block";
  statusBar.textContent = "Loading…";
  grid.style.display = "none";

  const { from, to } = dateRange();
  updateRangeLabel(from, to);

  try {
    const rows = await fetchEntries(from, to);
    data = {};
    for (const row of rows) {
      if (!data[row.date]) data[row.date] = {};
      data[row.date][row.activity] = row.value;
    }
  } catch (err) {
    statusBar.textContent = "Failed to load data. Is wrangler dev running?";
    console.error(err);
    return;
  }

  statusBar.style.display = "none";
  grid.style.display = "";
  buildGrid(getDates());
  scrollToToday();
}

function updateRangeLabel(from, to) {
  document.getElementById("range-label").textContent =
    formatShort(from) + " – " + formatShort(to);
}

function scrollToToday() {
  const today = todayStr();
  const todayHeader = document.querySelector(`th[data-date="${today}"]`);
  if (todayHeader) {
    const wrapper = document.getElementById("grid-wrapper");
    const offset = todayHeader.offsetLeft - wrapper.clientWidth / 2 + todayHeader.offsetWidth / 2;
    wrapper.scrollLeft = Math.max(0, offset);
  }
}

// ─────────────────────────────────────────────
//  Navigation (with debounce)
// ─────────────────────────────────────────────
document.getElementById("btn-prev").addEventListener("click", debounced(() => {
  anchorDate = addDays(anchorDate, -VIEW_DAYS);
  load();
}));

document.getElementById("btn-next").addEventListener("click", debounced(() => {
  anchorDate = addDays(anchorDate, VIEW_DAYS);
  load();
}));

document.getElementById("today-btn").addEventListener("click", debounced(() => {
  anchorDate = todayStr();
  load();
}));

// ─────────────────────────────────────────────
//  Init
// ─────────────────────────────────────────────
load();
</script>
